# Configurações Iniciais e Teclado
sudo loadkeys /usr/share/keymaps/i386/qwerty/pt-latin1.kmap.gz
configure
set system host-name Router1D

# Interfaces de Rede
set interfaces ethernet eth0 address '192.19.3.2/30'
set interfaces ethernet eth0 description 'Rede3'
set interfaces ethernet eth1 address '192.19.112.1/30'
set interfaces ethernet eth1 description 'Rede112'
set interfaces ethernet eth2 address '192.19.113.1/30'
set interfaces ethernet eth2 description 'Rede113'

# Serviço SSH
set service ssh port '22'
set service ssh access-control allow user vyos
set service ssh access-control deny user root

# Configuração OSPF MultiArea
set interfaces loopback lo address 10.0.2.1/32
set protocols ospf parameters router-id 10.0.2.1
set protocols ospf area 0 network 192.19.3.0/30
set protocols ospf area 2 network 192.19.112.0/30
set protocols ospf area 2 network 192.19.113.0/30
set protocols ospf log-adjacency-changes
set protocols ospf redistribute connected metric-type 2
set protocols ospf redistribute connected route-map CONNECT
set policy route-map CONNECT rule 10 action permit
set policy route-map CONNECT rule 10 match interface lo

commit
save
exit