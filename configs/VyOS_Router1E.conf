# Configurações Iniciais e Teclado
sudo loadkeys /usr/share/keymaps/i386/qwerty/pt-latin1.kmap.gz
configure
set system host-name Router1E

# Interfaces de Rede
set interfaces ethernet eth0 address '192.19.2.2/30'
set interfaces ethernet eth0 description 'Rede2'
set interfaces ethernet eth1 address '192.19.12.1/30'
set interfaces ethernet eth1 description 'Rede12'
set interfaces ethernet eth2 address '192.19.13.1/30'
set interfaces ethernet eth2 description 'Rede13'

# Serviço SSH
set service ssh port '22'
set service ssh access-control allow user vyos
set service ssh access-control deny user root

# Configuração OSPF MultiArea
set interfaces loopback lo address 10.0.1.1/32
set protocols ospf parameters router-id 10.0.1.1
set protocols ospf area 0 network 192.19.2.0/30
set protocols ospf area 1 network 192.19.12.0/30
set protocols ospf area 1 network 192.19.13.0/30
set protocols ospf log-adjacency-changes
set protocols ospf redistribute connected metric-type 2
set protocols ospf redistribute connected route-map CONNECT
set policy route-map CONNECT rule 10 action permit
set policy route-map CONNECT rule 10 match interface lo

commit
save
exit