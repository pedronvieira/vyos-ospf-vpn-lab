# Configurações Iniciais e Teclado
sudo loadkeys /usr/share/keymaps/i386/qwerty/pt-latin1.kmap.gz
configure
set system host-name RouterC

# Configuração de Interfaces
set interfaces ethernet eth0 address dhcp
set interfaces ethernet eth0 description 'OUTSIDE'
set interfaces ethernet eth1 address '192.19.2.1/30'
set interfaces ethernet eth1 description 'Rede2'
set interfaces ethernet eth2 address '192.19.3.1/30'
set interfaces ethernet eth2 description 'Rede3'

# Configuração SSH
set service ssh port '22'
set service ssh access-control allow user vyos
set service ssh access-control deny user root

# Configuração NAT (Mascaramento para saída)
set nat source rule 100 outbound-interface name 'eth0'
set nat source rule 100 source address '192.19.0.0/16'
set nat source rule 100 translation address masquerade

# Configuração OSPF Multi-área
set interfaces loopback lo address 10.0.0.1/32
set protocols ospf parameters router-id 10.0.0.1
set protocols ospf area 0 network 192.19.2.0/30
set protocols ospf area 0 network 192.19.3.0/30
set protocols ospf log-adjacency-changes
set protocols ospf auto-cost reference-bandwidth '1000'
set protocols ospf redistribute connected metric-type 2
set protocols ospf redistribute connected route-map CONNECT

# OSPF - Router de Saída (Default Information Originate)
set protocols ospf default-information originate always
set protocols ospf default-information originate metric 10
set protocols ospf default-information originate metric-type 2

# Políticas de Encaminhamento
set policy route-map CONNECT rule 10 action permit
set policy route-map CONNECT rule 10 match interface lo

commit
save
exit