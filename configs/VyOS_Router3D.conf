# Configurações Iniciais e Teclado
sudo loadkeys /usr/share/keymaps/i386/qwerty/pt-latin1.kmap.gz
configure
set system host-name Router3D

# Interfaces de Rede
set interfaces ethernet eth0 address '192.19.113.2/30'
set interfaces ethernet eth0 description 'Rede113'
set interfaces ethernet eth1 address '192.19.123.2/30'
set interfaces ethernet eth1 description 'Rede123'
set interfaces ethernet eth2 address '192.19.130.254/24'
set interfaces ethernet eth2 description 'Rede130'
set interfaces ethernet eth3 address 192.19.120.253/24

# Serviço SSH
set service ssh port '22'
set service ssh access-control allow user vyos
set service ssh access-control deny user root

# VPN - Túnel GRE e IPsec Site-to-Site
set interfaces tunnel tun0 encapsulation gre
set interfaces tunnel tun0 source-address 192.19.113.2
set interfaces tunnel tun0 remote 192.19.12.2
set interfaces tunnel tun0 address 10.10.10.2/30
set vpn ipsec interface eth0
set vpn ipsec authentication psk vyos id 192.19.113.2
set vpn ipsec authentication psk vyos id 192.19.12.2
set vpn ipsec authentication psk vyos secret MYSECRETKEY
set vpn ipsec ike-group MyIKEGroup proposal 1 dh-group '2'
set vpn ipsec ike-group MyIKEGroup proposal 1 encryption 'aes128'
set vpn ipsec ike-group MyIKEGroup proposal 1 hash 'sha1'
set vpn ipsec esp-group MyESPGroup proposal 1 encryption 'aes128'
set vpn ipsec esp-group MyESPGroup proposal 1 hash 'sha1'
set vpn ipsec site-to-site peer right authentication mode pre-shared-secret
set vpn ipsec site-to-site peer right authentication remote-id 192.19.12.2
set vpn ipsec site-to-site peer right ike-group MyIKEGroup
set vpn ipsec site-to-site peer right default-esp-group MyESPGroup
set vpn ipsec site-to-site peer right local-address 192.19.113.2
set vpn ipsec site-to-site peer right remote-address 192.19.12.2
set vpn ipsec site-to-site peer right tunnel 1 protocol gre

# Configuração OSPF MultiArea
set interfaces loopback lo address 10.0.2.3/32
set protocols ospf parameters router-id 10.0.2.3
set protocols ospf area 2 network 192.19.113.0/30
set protocols ospf area 2 network 192.19.123.0/30
set protocols ospf area 2 network 192.19.130.0/24
set protocols ospf area 2 network 192.19.120.0/24
set protocols ospf area 2 network 10.10.10.0/30
set protocols ospf log-adjacency-changes
set protocols ospf redistribute connected metric-type 2
set protocols ospf redistribute connected route-map CONNECT
set policy route-map CONNECT rule 10 action permit
set policy route-map CONNECT rule 10 match interface lo

# Configuração de Alta Disponibilidade (VRRP)
set high-availability vrrp group LAN130 vrid '130'
set high-availability vrrp group LAN130 interface 'eth2'
set high-availability vrrp group LAN130 hello-source-address '192.19.130.254'
set high-availability vrrp group LAN130 peer-address '192.19.130.253'
set high-availability vrrp group LAN130 address '192.19.130.246/24'
set high-availability vrrp group LAN130 priority '200'
delete high-availability vrrp group LAN130 no-preempt
set high-availability vrrp group LAN130 preempt 1
set high-availability vrrp group LAN130 preempt-delay 3
set high-availability vrrp group LAN130 authentication type plaintext-password
set high-availability vrrp group LAN130 authentication password Passw0rd

set high-availability vrrp group LAN120 vrid '120'
set high-availability vrrp group LAN120 interface 'eth3'
set high-availability vrrp group LAN120 hello-source-address '192.19.120.253'
set high-availability vrrp group LAN120 peer-address '192.19.120.254'
set high-availability vrrp group LAN120 address '192.19.120.246/24'
set high-availability vrrp group LAN120 priority '100'
delete high-availability vrrp group LAN120 no-preempt
set high-availability vrrp group LAN120 preempt 1
set high-availability vrrp group LAN120 preempt-delay 3
set high-availability vrrp group LAN120 authentication type plaintext-password
set high-availability vrrp group LAN120 authentication password Passw0rd

set high-availability vrrp sync-group sync member 'LAN120'
set high-availability vrrp sync-group sync member 'LAN130'

commit
save
exit

# NOTA: Comandos para executar no bash (restrições SSH / hosts.deny / hosts.allow)
# sudo nano /etc/hosts.deny -> Adicionar: sshd: 192.19.12.2, 192.19.23.1, 192.19.20.254, 192.19.20.1, 192.19.30.253, 192.19.30.1
# sudo nano /etc/hosts.allow -> Adicionar: sshd: 10.10.10.1